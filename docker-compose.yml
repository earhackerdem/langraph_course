services:
  postgres:
    image: postgres:16-alpine
    container_name: langraph_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-langraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langraph}
      POSTGRES_DB: ${POSTGRES_DB:-langraph_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-langraph}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: